<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Koan — Knowledge Landscape</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --ink: #e6e8ec; --muted: #9aa3b2;
    --line: #2a2f3a; --related: #3b4250; --overlap: #d9883b; --contradiction: #e5484d;
    --promoted: #4cc38a; --draft: #6e7891; --gap: #e5484d; --accent: #5b8def;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f7f8fa; --panel:#fff; --ink:#1a1d23; --muted:#5a6472; --line:#e2e5ea; --related:#c3c9d4; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #wrap { display: flex; height: 100%; }
  #stage { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; cursor: grab; }
  svg.dragging { cursor: grabbing; }
  aside { width: 280px; border-left: 1px solid var(--line); background: var(--panel);
    padding: 18px; overflow-y: auto; }
  h1 { font-size: 15px; margin: 0 0 2px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .stat b { font-weight: 600; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    margin: 20px 0 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 12px; color: var(--muted); }
  .swatch { width: 14px; height: 14px; border-radius: 50%; flex: none; }
  .edge-key { width: 22px; height: 0; border-top: 2px solid; flex: none; }
  .node circle { cursor: pointer; transition: stroke-width .1s; }
  .node text { font-size: 11px; fill: var(--ink); pointer-events: none; paint-order: stroke;
    stroke: var(--bg); stroke-width: 3px; }
  .node.gap text { fill: var(--gap); }
  #tip { position: absolute; pointer-events: none; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px 12px; max-width: 280px; font-size: 12px; opacity: 0;
    transition: opacity .1s; box-shadow: 0 6px 20px rgba(0,0,0,.3); z-index: 5; }
  #tip h3 { margin: 0 0 4px; font-size: 13px; }
  #tip .meta { color: var(--muted); margin-bottom: 6px; }
  #tip .trig { color: var(--ink); }
  .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 11px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <svg id="svg"></svg>
    <div id="tip"></div>
  </div>
  <aside>
    <h1>Knowledge Landscape</h1>
    <div class="sub" id="generated"></div>
    <div class="stat"><span>Total units</span><b id="s-total">0</b></div>
    <div class="stat"><span>Promoted</span><b id="s-promoted">0</b></div>
    <div class="stat"><span>Draft</span><b id="s-draft">0</b></div>
    <div class="stat"><span>Gaps flagged</span><b id="s-gaps">0</b></div>

    <h2>Nodes</h2>
    <div class="legend-row"><span class="swatch" style="background:var(--promoted)"></span>Promoted unit</div>
    <div class="legend-row"><span class="swatch" style="background:var(--draft)"></span>Draft unit</div>
    <div class="legend-row"><span class="swatch" style="background:transparent;border:2px dashed var(--gap)"></span>Gap (missing)</div>
    <div class="legend-row"><span class="swatch" style="background:transparent;border:2px solid var(--accent)"></span>Confidential ring</div>

    <h2>Connections</h2>
    <div class="legend-row"><span class="edge-key" style="border-color:var(--related)"></span>Related / references</div>
    <div class="legend-row"><span class="edge-key" style="border-color:var(--overlap);border-top-style:dashed"></span>Overlap / duplicate</div>
    <div class="legend-row"><span class="edge-key" style="border-color:var(--contradiction)"></span>Contradiction</div>

    <h2>Areas</h2>
    <div id="area-legend"></div>
  </aside>
</div>

<script>
// Populated by the map skill. Shape:
// { generatedAt, stats:{total,promoted,draft,gaps}, nodes:[{id,title,type,status,confidentiality,practiceArea,trigger}], edges:[{source,target,kind}] }
const GRAPH = /*__GRAPH_DATA__*/ {"generatedAt":"","stats":{"total":0,"promoted":0,"draft":0,"gaps":0},"nodes":[],"edges":[]};

const svg = document.getElementById('svg');
const tip = document.getElementById('tip');
const NS = 'http://www.w3.org/2000/svg';
const PALETTE = ['#5b8def','#4cc38a','#d9883b','#a86ee0','#e5689a','#46b0c9','#c9a13b','#7a86f0'];

// area -> color
const areas = [...new Set(GRAPH.nodes.filter(n=>n.type!=='gap').map(n=>n.practiceArea||'—'))];
const areaColor = a => PALETTE[Math.max(0, areas.indexOf(a)) % PALETTE.length];

// stats
GRAPH.stats = GRAPH.stats || {};
document.getElementById('generated').textContent = GRAPH.generatedAt ? 'Generated ' + GRAPH.generatedAt : '';
document.getElementById('s-total').textContent = GRAPH.stats.total ?? GRAPH.nodes.filter(n=>n.type!=='gap').length;
document.getElementById('s-promoted').textContent = GRAPH.stats.promoted ?? 0;
document.getElementById('s-draft').textContent = GRAPH.stats.draft ?? 0;
document.getElementById('s-gaps').textContent = GRAPH.stats.gaps ?? GRAPH.nodes.filter(n=>n.type==='gap').length;
const al = document.getElementById('area-legend');
areas.forEach(a => { const d=document.createElement('div'); d.className='legend-row';
  d.innerHTML = `<span class="swatch" style="background:${areaColor(a)}"></span>${a}`; al.appendChild(d); });

// layout
let W = svg.clientWidth || 900, H = svg.clientHeight || 600;
const nodes = GRAPH.nodes.map((n,i)=>({ ...n, x: W/2 + Math.cos(i)*200*Math.random(), y: H/2 + Math.sin(i)*200*Math.random(), vx:0, vy:0 }));
const byId = Object.fromEntries(nodes.map(n=>[n.id,n]));
const edges = GRAPH.edges.map(e=>({ ...e, s: byId[e.source], t: byId[e.target] })).filter(e=>e.s&&e.t);

const root = document.createElementNS(NS,'g'); svg.appendChild(root);
const edgeColor = k => k==='contradiction'?'var(--contradiction)':k==='overlap'?'var(--overlap)':'var(--related)';

const edgeEls = edges.map(e=>{ const l=document.createElementNS(NS,'line');
  l.setAttribute('stroke', edgeColor(e.kind));
  l.setAttribute('stroke-width', e.kind==='contradiction'?2.4:1.4);
  if (e.kind==='overlap') l.setAttribute('stroke-dasharray','5 4');
  root.appendChild(l); return l; });

const nodeEls = nodes.map(n=>{ const g=document.createElementNS(NS,'g'); g.setAttribute('class','node'+(n.type==='gap'?' gap':''));
  const c=document.createElementNS(NS,'circle'); const r = n.type==='gap'?11:14;
  c.setAttribute('r', r);
  c.setAttribute('fill', n.type==='gap'?'transparent':(n.status==='draft'?'var(--draft)':areaColor(n.practiceArea||'—')));
  c.setAttribute('stroke', n.type==='gap'?'var(--gap)':(n.confidentiality&&n.confidentiality!=='internal'?'var(--accent)':'rgba(255,255,255,.25)'));
  c.setAttribute('stroke-width', n.type==='gap'?2:(n.confidentiality&&n.confidentiality!=='internal'?3:1.5));
  if (n.type==='gap') c.setAttribute('stroke-dasharray','4 3');
  if (n.status==='draft' && n.type!=='gap') c.setAttribute('stroke-dasharray','3 3');
  const t=document.createElementNS(NS,'text'); t.setAttribute('x', r+5); t.setAttribute('y', 4);
  t.textContent = (n.title||n.id).slice(0,28);
  g.appendChild(c); g.appendChild(t); root.appendChild(g);
  g.addEventListener('mousemove', ev => showTip(ev, n));
  g.addEventListener('mouseleave', ()=> tip.style.opacity=0);
  enableDrag(g, n);
  return g; });

function showTip(ev, n){
  const conf = n.confidentiality && n.confidentiality!=='internal' ? ` · ${n.confidentiality}` : '';
  tip.innerHTML = `<h3>${n.title||n.id}</h3>`+
    `<div class="meta">${n.type==='gap'?'<span class="pill" style="background:var(--gap);color:#fff">GAP — not captured</span>':
      `<span class="pill" style="background:${n.status==='draft'?'var(--draft)':'var(--promoted)'};color:#0f1115">${(n.status||'unit')}</span> ${n.practiceArea||''}${conf}`}</div>`+
    (n.trigger?`<div class="trig">${n.trigger}</div>`:'');
  tip.style.opacity = 1;
  const r = svg.getBoundingClientRect();
  tip.style.left = Math.min(ev.clientX - r.left + 14, r.width - 290) + 'px';
  tip.style.top = (ev.clientY - r.top + 14) + 'px';
}

// force simulation
let alpha = 1;
function tick(){
  alpha *= 0.985;
  const MIN = 92; // hard separation so labelled nodes don't overlap
  for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++){
    const a=nodes[i], b=nodes[j]; let dx=b.x-a.x, dy=b.y-a.y; let d2=dx*dx+dy*dy||1; let d=Math.sqrt(d2);
    const rep = 11000/d2; const fx=dx/d*rep, fy=dy/d*rep; a.vx-=fx; a.vy-=fy; b.vx+=fx; b.vy+=fy;
    if (d < MIN){ const push=(MIN-d)*0.5; a.x-=dx/d*push; a.y-=dy/d*push; b.x+=dx/d*push; b.y+=dy/d*push; }
  }
  for (const e of edges){ let dx=e.t.x-e.s.x, dy=e.t.y-e.s.y; let d=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(d-170)*0.012; const fx=dx/d*f, fy=dy/d*f; e.s.vx+=fx; e.s.vy+=fy; e.t.vx-=fx; e.t.vy-=fy; }
  for (const n of nodes){ n.vx+=(W/2-n.x)*0.0009; n.vy+=(H/2-n.y)*0.0009;
    if(!n.fixed){ n.vx*=0.86; n.vy*=0.86; n.x+=n.vx*alpha*3; n.y+=n.vy*alpha*3; } }
  edgeEls.forEach((l,i)=>{ l.setAttribute('x1',edges[i].s.x); l.setAttribute('y1',edges[i].s.y);
    l.setAttribute('x2',edges[i].t.x); l.setAttribute('y2',edges[i].t.y); });
  nodeEls.forEach((g,i)=> g.setAttribute('transform',`translate(${nodes[i].x},${nodes[i].y})`));
  if (alpha>0.02) requestAnimationFrame(tick);
}
tick();

// node drag
function enableDrag(g, n){
  let down=false;
  g.addEventListener('mousedown', e=>{ down=true; n.fixed=true; e.stopPropagation(); });
  window.addEventListener('mousemove', e=>{ if(!down) return; const p=toLocal(e); n.x=p.x; n.y=p.y; alpha=Math.max(alpha,.4); tick(); });
  window.addEventListener('mouseup', ()=>{ if(down){ down=false; n.fixed=false; } });
}
// pan + zoom
let view={x:0,y:0,k:1}; function apply(){ root.setAttribute('transform',`translate(${view.x},${view.y}) scale(${view.k})`); }
function toLocal(e){ const r=svg.getBoundingClientRect(); return {x:(e.clientX-r.left-view.x)/view.k, y:(e.clientY-r.top-view.y)/view.k}; }
let panning=false, start;
svg.addEventListener('mousedown', e=>{ if(e.target===svg||e.target===root){ panning=true; svg.classList.add('dragging'); start={x:e.clientX-view.x,y:e.clientY-view.y}; }});
window.addEventListener('mousemove', e=>{ if(panning){ view.x=e.clientX-start.x; view.y=e.clientY-start.y; apply(); }});
window.addEventListener('mouseup', ()=>{ panning=false; svg.classList.remove('dragging'); });
svg.addEventListener('wheel', e=>{ e.preventDefault(); const f=e.deltaY<0?1.1:0.9; view.k=Math.max(.3,Math.min(3,view.k*f)); apply(); }, {passive:false});
window.addEventListener('resize', ()=>{ W=svg.clientWidth; H=svg.clientHeight; alpha=Math.max(alpha,.3); tick(); });
</script>
</body>
</html>
